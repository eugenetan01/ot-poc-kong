services:
  kong-security-poc:
    image: kong/kong-gateway:3.13
    container_name: kong-security-poc
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_ROLE: data_plane
      KONG_KONNECT_MODE: "on"
      KONG_CLUSTER_MTLS: pki
      KONG_CLUSTER_CONTROL_PLANE: ${KONG_CLUSTER_CONTROL_PLANE}
      KONG_CLUSTER_SERVER_NAME: ${KONG_CLUSTER_SERVER_NAME}
      KONG_CLUSTER_TELEMETRY_ENDPOINT: ${KONG_CLUSTER_TELEMETRY_ENDPOINT}
      KONG_CLUSTER_TELEMETRY_SERVER_NAME: ${KONG_CLUSTER_TELEMETRY_SERVER_NAME}
      KONG_CLUSTER_CERT: /etc/kong/tls/tls.crt
      KONG_CLUSTER_CERT_KEY: /etc/kong/tls/tls.key
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: system
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: bundled
      KONG_TRUSTED_IPS: 0.0.0.0/0,::/0
      KONG_REAL_IP_HEADER: X-Forwarded-For
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8100:8100"
    volumes:
      - ${tls_cert}:/etc/kong/tls/tls.crt:ro
      - ${tls_key}:/etc/kong/tls/tls.key:ro
